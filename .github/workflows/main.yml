name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint

  test:
    needs: lint
    strategy:
      matrix:
        include:
          # Test xclip on Ubuntu with Node 22
          - node-version: 22.x
            os: ubuntu-latest
            install-cmd: sudo apt-get update && sudo apt-get install -y xclip xvfb
            test-cmd: xvfb-run -a pnpm test
          # Test xsel on Ubuntu with Node 22
          - node-version: 22.x
            os: ubuntu-latest
            install-cmd: sudo apt-get update && sudo apt-get install -y xsel xvfb
            test-cmd: xvfb-run -a pnpm test
          # Test xclip on Ubuntu with Node 24
          - node-version: 24.x
            os: ubuntu-latest
            install-cmd: sudo apt-get update && sudo apt-get install -y xclip xvfb
            test-cmd: xvfb-run -a pnpm test
          # Test xsel on Ubuntu with Node 24
          - node-version: 24.x
            os: ubuntu-latest
            install-cmd: sudo apt-get update && sudo apt-get install -y xsel xvfb
            test-cmd: xvfb-run -a pnpm test
          # We do not test Wayland nor WSL support as setting this up in CI is tricky
          # We only test Node 24 on macOS and Windows to reduce CI usage
          - node-version: 24.x
            os: macos-14
          - node-version: 24.x
            os: windows-2025
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node v${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install Clipboard Tool
        if: matrix.install-cmd
        run: ${{ matrix.install-cmd }}
      - name: Install Dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Test
        run: ${{ matrix.test-cmd || 'pnpm test' }}
